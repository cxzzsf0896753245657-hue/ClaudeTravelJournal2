<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>旅程手帳｜行程與花費規劃</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F0E4;
    --grid-line: rgba(47,72,88,0.055);
    --surface:#FFFFFF;
    --surface-2:#FBF8F1;
    --ink:#26221F;
    --muted:#8A8072;
    --indigo:#2F4858;
    --indigo-2:#41637A;
    --vermilion:#BF3B2C;
    --vermilion-soft:#F4DAD4;
    --matcha:#5F7A52;
    --matcha-soft:#DEE7D6;
    --ochre:#B98A34;
    --ochre-soft:#F2E3C4;
    --line:#DCD2BB;
    --shadow: 0 1px 2px rgba(38,34,31,0.06), 0 6px 20px -8px rgba(38,34,31,0.18);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background-color:var(--paper);
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 28px 28px;
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:80px;
  }
  ::selection{ background:var(--ochre-soft); }
  input, select, textarea, button{ font-family:inherit; color:inherit; }
  button{ cursor:pointer; }

  .mono{ font-family:'JetBrains Mono', monospace; }
  .serif{ font-family:'Shippori Mincho', serif; }

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:50;
    background: rgba(245,240,228,0.92);
    backdrop-filter: blur(6px);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:1180px; margin:0 auto; padding:18px 24px 14px;
    display:flex; align-items:center; gap:26px; flex-wrap:wrap;
  }
  .brand{
    display:flex; align-items:center; gap:12px;
  }
  .brand .stamp{
    width:36px; height:36px; border-radius:50%;
    border:2px solid var(--vermilion); color:var(--vermilion);
    display:flex; align-items:center; justify-content:center;
    font-family:'Shippori Mincho', serif; font-weight:700; font-size:14px;
    letter-spacing:-1px; flex-shrink:0; box-shadow:0 1px 3px rgba(191,59,44,0.18);
  }
  .brand-title-input{
    font-family:'Shippori Mincho', serif; font-weight:700; font-size:21px; letter-spacing:.01em;
    border:none; background:transparent; outline:none; color:var(--ink);
    padding:3px 6px; border-radius:6px; min-width:150px;
  }
  .brand-title-input:focus{ background:var(--surface); box-shadow:0 0 0 1px var(--line); }

  .stats{
    display:flex; gap:12px; margin-left:auto; flex-wrap:wrap; align-items:center;
  }
  .share-btn{
    background:var(--surface); border:1px solid var(--indigo-2); border-radius:999px;
    padding:7px 16px; font-size:12.5px; color:var(--indigo-2); cursor:pointer; white-space:nowrap;
    display:flex; align-items:center; gap:6px; box-shadow:0 1px 2px rgba(38,34,31,0.04);
  }
  .share-btn:hover{ background:var(--surface-2); border-color:var(--indigo); }
  .stat-chip{
    background:var(--surface); border:1px solid var(--line); border-radius:999px;
    padding:7px 16px; font-size:12.5px; color:var(--muted); display:flex; gap:8px; align-items:center;
    white-space:nowrap; letter-spacing:.01em; box-shadow:0 1px 2px rgba(38,34,31,0.04);
  }
  .stat-chip b{ color:var(--ink); font-family:'JetBrains Mono',monospace; font-weight:600; font-size:13px; }
  .stat-chip.budget b{ color:var(--indigo); }
  .stat-chip.actual b{ color:var(--vermilion); }

  .day-nav-wrap{
    position:relative; max-width:1180px; margin:2px auto 0; border-top:1px dashed var(--line);
  }
  .day-nav{
    padding:12px 24px 16px; margin:0; display:flex; gap:10px; overflow-x:auto;
    scrollbar-width:none; cursor:grab; -webkit-overflow-scrolling:touch;
  }
  .day-nav::-webkit-scrollbar{ display:none; }
  .day-nav.grabbing{ cursor:grabbing; }
  .day-nav.grabbing .day-nav-chip{ pointer-events:none; }
  .day-nav-fade{
    position:absolute; top:0; bottom:0; width:36px; pointer-events:none; z-index:2;
  }
  .day-nav-fade.left{ left:0; background:linear-gradient(90deg, var(--paper), transparent); }
  .day-nav-fade.right{ right:0; background:linear-gradient(270deg, var(--paper), transparent); }
  .day-nav-chip{
    flex-shrink:0; background:var(--surface); border:1px solid var(--line);
    border-radius:999px; padding:8px 16px; display:flex; align-items:center; gap:7px;
    box-shadow:0 1px 2px rgba(38,34,31,0.04); transition: box-shadow .15s, transform .15s, border-color .15s;
    user-select:none;
  }
  .day-nav-chip:hover{ border-color:var(--indigo-2); box-shadow:0 3px 10px -4px rgba(38,34,31,0.25); transform:translateY(-1px); }
  .day-nav-chip .day-num{ font-family:'Shippori Mincho',serif; font-weight:600; font-size:12.5px; color:var(--ink); white-space:nowrap; }
  .day-nav-chip .day-dot{ width:3px; height:3px; border-radius:50%; background:var(--vermilion); flex-shrink:0; }
  .day-nav-chip .day-date{ font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--muted); white-space:nowrap; }
  .day-nav-chip.active{ border-color:var(--vermilion); background:var(--vermilion-soft); }
  .day-nav-chip.active .day-num{ color:var(--vermilion); }

  /* ---------- layout ---------- */
  .wrap{ max-width:1180px; margin:0 auto; padding:24px 20px; }

  .section-title{
    display:flex; align-items:baseline; gap:10px; margin: 34px 0 14px;
  }
  .section-title .num{
    font-family:'JetBrains Mono',monospace; color:var(--vermilion); font-size:13px;
  }
  .section-title h2{
    font-family:'Shippori Mincho',serif; font-size:21px; font-weight:600; margin:0;
  }
  .section-title .rule{ flex:1; height:1px; background:var(--line); }

  /* ---------- budget table ---------- */
  .budget-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:18px 18px 8px; margin-bottom:10px;
  }
  .budget-meta{
    display:flex; gap:24px; flex-wrap:wrap; margin-bottom:16px;
  }
  .meta-field{ display:flex; flex-direction:column; gap:4px; }
  .meta-field label{ font-size:11.5px; color:var(--muted); letter-spacing:.03em; }
  .meta-field input{
    border:none; border-bottom:1px solid var(--line); background:transparent;
    font-family:'JetBrains Mono',monospace; font-size:15px; width:80px; padding:2px 0; outline:none;
  }
  .meta-field input:focus{ border-color:var(--indigo); }
  .meta-field input.date-meta-input{
    width:142px; font-family:'JetBrains Mono',monospace; font-size:13px;
    padding:4px 2px; cursor:pointer;
  }
  .meta-hint{ font-size:11.5px; color:var(--muted); margin:-6px 0 16px; }

  table.budget{ width:100%; border-collapse:collapse; font-size:13.5px; }
  table.budget th{
    text-align:left; font-weight:500; color:var(--muted); font-size:11.5px;
    padding:6px 8px; border-bottom:1px solid var(--line); letter-spacing:.02em;
  }
  table.budget td{ padding:6px 8px; border-bottom:1px dashed var(--line); vertical-align:middle; }
  table.budget tr:last-child td{ border-bottom:none; }
  table.budget input[type="text"]{
    border:none; background:transparent; font-size:13.5px; width:100%; outline:none; padding:3px 4px; border-radius:4px;
  }
  table.budget input[type="text"]:focus{ background:var(--surface-2); }
  table.budget input[type="number"]{
    border:none; border-bottom:1px solid var(--line); background:transparent;
    font-family:'JetBrains Mono',monospace; font-size:13.5px; width:78px; outline:none; padding:3px 2px; text-align:right;
  }
  table.budget input[type="number"]:focus{ border-color:var(--indigo); }
  table.budget select{
    border:1px solid var(--line); background:var(--surface-2); border-radius:6px;
    font-size:12px; padding:3px 6px; outline:none;
  }
  table.budget td.num{ font-family:'JetBrains Mono',monospace; text-align:right; white-space:nowrap; }
  .row-total td{ font-weight:600; border-top:2px solid var(--indigo); border-bottom:none !important; padding-top:10px; }
  .row-total td.num{ color:var(--indigo); font-size:15px; }
  .del-row-btn{
    border:none; background:none; color:var(--muted); font-size:15px; line-height:1; padding:2px 6px; border-radius:4px;
  }
  .del-row-btn:hover{ color:var(--vermilion); background:var(--vermilion-soft); }
  .add-cat-btn{
    border:1px dashed var(--line); background:none; color:var(--indigo-2); font-size:12.5px;
    padding:6px 12px; border-radius:8px; margin:10px 0 14px;
  }
  .add-cat-btn:hover{ border-color:var(--indigo); background:var(--surface-2); }

  .compare-strip{
    display:flex; gap:14px; flex-wrap:wrap; margin-top:6px; margin-bottom:16px;
  }
  .compare-box{
    flex:1; min-width:160px; background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow);
  }
  .compare-box .label{ font-size:11.5px; color:var(--muted); margin-bottom:4px; }
  .compare-box .value{ font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:600; }
  .compare-box.budget .value{ color:var(--indigo); }
  .compare-box.actual .value{ color:var(--vermilion); }
  .compare-box.diff .value{ color:var(--matcha); }
  .compare-box .sub{ font-size:11px; color:var(--muted); margin-top:2px; }

  /* ---------- days ---------- */
  .day{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); margin-bottom:22px; overflow:hidden; scroll-margin-top:130px;
  }
  .day-head{
    display:flex; align-items:center; gap:12px; padding:14px 18px;
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border-bottom:1px solid var(--line); flex-wrap:wrap;
  }
  .hanko{
    width:38px; height:38px; border-radius:50%; border:2px solid var(--vermilion);
    color:var(--vermilion); display:flex; align-items:center; justify-content:center;
    font-family:'Shippori Mincho',serif; font-weight:700; font-size:14px; flex-shrink:0;
  }
  .day-head input.date-input{
    font-family:'JetBrains Mono',monospace; font-weight:600; font-size:14.5px; border:none;
    background:transparent; outline:none; width:112px; padding:3px 4px; border-radius:4px;
  }
  .day-head input.weekday-input{
    font-size:12.5px; color:var(--muted); border:none; background:transparent; outline:none;
    width:60px; padding:3px 4px; border-radius:4px;
  }
  .day-head input.city-input{
    font-family:'Shippori Mincho',serif; font-size:15px; border:none; background:transparent;
    outline:none; flex:1; min-width:100px; padding:3px 6px; border-radius:4px;
  }
  .day-head input:focus{ background:var(--surface); box-shadow:0 0 0 1px var(--line); }
  .day-actions{ display:flex; gap:6px; margin-left:auto; }
  .icon-btn{
    border:1px solid var(--line); background:var(--surface); border-radius:8px;
    width:28px; height:28px; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:14px;
  }
  .icon-btn:hover{ color:var(--vermilion); border-color:var(--vermilion); }

  .day-handle{
    cursor:grab; color:var(--muted); font-size:15px; padding:4px 2px; touch-action:none;
    line-height:1; user-select:none; flex-shrink:0;
  }
  .day-handle:active{ cursor:grabbing; }
  .day-handle:hover{ color:var(--indigo); }
  .day.day-dragging-source{ opacity:0.35; }
  .day-drag-ghost{
    position:fixed; z-index:300; pointer-events:none; background:var(--indigo); color:#fff;
    padding:10px 18px; border-radius:10px; font-size:13.5px; font-weight:600;
    box-shadow:0 14px 32px -8px rgba(38,34,31,0.45); transform:rotate(-1deg);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .day-placeholder{
    height:6px; background:var(--vermilion); border-radius:4px; margin:0 0 22px;
  }

  .stay-card{
    display:flex; align-items:center; gap:10px; padding:11px 16px;
    background:var(--ochre-soft); border-top:1px solid var(--line); flex-wrap:wrap;
  }
  .stay-label{
    background:var(--ochre); color:#fff; font-size:10.5px; font-weight:600;
    padding:4px 11px; border-radius:999px; flex-shrink:0; letter-spacing:.02em;
  }
  .stay-name-input{
    flex:1.4; min-width:140px; border:1px solid transparent; background:var(--surface);
    border-radius:8px; padding:7px 11px; font-size:13px; outline:none;
  }
  .stay-name-input:focus{ border-color:var(--ochre); }
  .stay-name-input::placeholder{ color:var(--muted); }
  .stay-cost-wrap{ display:flex; align-items:center; gap:4px; flex-shrink:0; }
  .stay-cost-input{
    width:72px; border:none; border-bottom:1px solid var(--line); background:transparent;
    font-family:'JetBrains Mono',monospace; font-size:12.5px; outline:none; padding:4px 0; text-align:right;
  }
  .stay-cost-input:focus{ border-color:var(--ochre); }
  .stay-note-input{
    flex:1; min-width:120px; border:1px solid transparent; background:var(--surface);
    border-radius:8px; padding:7px 11px; font-size:12px; color:var(--muted); outline:none;
  }
  .stay-note-input:focus{ border-color:var(--ochre); color:var(--ink); }

  /* ---------- trip-level notes & attachments ---------- */
  .notes-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:18px; margin-bottom:10px;
  }
  .notes-textarea{
    width:100%; min-height:96px; border:1px solid var(--line); border-radius:10px;
    background:var(--surface-2); padding:12px 14px; font-size:13.5px; line-height:1.7;
    outline:none; resize:vertical; font-family:'Noto Sans TC',sans-serif; color:var(--ink);
  }
  .notes-textarea:focus{ border-color:var(--indigo); background:var(--surface); }
  .notes-textarea::placeholder{ color:var(--muted); }

  .attachment-grid{ display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
  .attachment-thumb{
    position:relative; width:84px; height:84px; border-radius:10px; overflow:hidden;
    border:1px solid var(--line); background:var(--surface-2); flex-shrink:0;
  }
  .attachment-thumb img{ width:100%; height:100%; object-fit:cover; cursor:zoom-in; display:block; }
  .attachment-thumb.loading{ display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:11px; }
  .file-tile{
    width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px; cursor:pointer; padding:6px 4px; text-align:center; background:var(--surface-2); border:none;
  }
  .file-tile .file-tile-icon{ font-size:22px; line-height:1; }
  .file-tile .file-tile-name{
    font-size:9.5px; color:var(--muted); line-height:1.3; word-break:break-all;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .file-tile:hover{ background:var(--surface); }
  .text-preview-pre{
    white-space:pre-wrap; word-break:break-word; max-height:56vh; overflow:auto;
    background:var(--surface-2); border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; font-size:12.5px; line-height:1.7; margin:0; font-family:'JetBrains Mono',monospace;
  }
  .attachment-del{
    position:absolute; top:3px; right:3px; width:20px; height:20px; border-radius:50%;
    border:none; background:rgba(38,34,31,0.6); color:#fff; font-size:12px; line-height:1;
    display:flex; align-items:center; justify-content:center;
  }
  .attachment-del:hover{ background:var(--vermilion); }

  .attachment-add-btn{
    display:inline-flex; align-items:center; gap:6px; border:1px dashed var(--line);
    background:none; color:var(--indigo-2); font-size:12.5px; padding:8px 14px;
    border-radius:8px; margin-top:14px; cursor:pointer;
  }
  .attachment-add-btn:hover{ border-color:var(--indigo); background:var(--surface-2); }
  .attachment-hint{ font-size:11px; color:var(--muted); margin:8px 0 0; }

  .lightbox-overlay{
    position:fixed; inset:0; background:rgba(20,18,16,0.82); z-index:1000;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .lightbox-box{ position:relative; max-width:92vw; max-height:88vh; }
  .lightbox-box img{ max-width:92vw; max-height:88vh; border-radius:8px; display:block; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  .lightbox-close{
    position:absolute; top:-14px; right:-14px; width:32px; height:32px; border-radius:50%;
    border:none; background:var(--surface); color:var(--ink); font-size:16px; box-shadow:var(--shadow);
  }

  /* ---------- per-day file strip ---------- */
  .day-files{
    display:flex; align-items:flex-start; gap:10px; padding:11px 16px;
    background:var(--surface-2); border-top:1px solid var(--line); flex-wrap:wrap;
  }
  .day-files-label{
    font-size:10.5px; font-weight:600; color:var(--indigo-2); padding-top:5px; flex-shrink:0;
    letter-spacing:.02em; white-space:nowrap;
  }
  .day-files .attachment-grid{ margin-top:0; flex:1; }
  .day-files .attachment-thumb{ width:56px; height:56px; border-radius:8px; }
  .day-files .file-tile .file-tile-icon{ font-size:16px; }
  .day-files .file-tile .file-tile-name{ font-size:8px; -webkit-line-clamp:1; }
  .day-files-add{
    flex-shrink:0; width:56px; height:56px; border:1px dashed var(--line); border-radius:8px;
    display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:18px;
    cursor:pointer;
  }
  .day-files-add:hover{ border-color:var(--indigo-2); color:var(--indigo-2); background:var(--surface); }


  .periods{ display:flex; gap:1px; background:var(--line); }
  @media (max-width: 760px){ .periods{ flex-direction:column; } }
  .period-col{
    flex:1; min-width:0; background:var(--surface); padding:12px; display:flex; flex-direction:column; gap:8px;
  }
  .period-label{
    font-size:11.5px; letter-spacing:.05em; color:var(--muted); font-weight:600;
    display:flex; align-items:center; gap:6px; padding:0 2px;
  }
  .period-label .dot{ width:6px; height:6px; border-radius:50%; background:var(--ochre); }
  .period-col[data-period="早上"] .dot{ background:var(--ochre); }
  .period-col[data-period="下午"] .dot{ background:var(--indigo-2); }
  .period-col[data-period="晚上"] .dot{ background:var(--vermilion); }

  .cards{ display:flex; flex-direction:column; gap:8px; min-height:14px; }
  .card{
    background:var(--surface-2); border:1px solid var(--line); border-radius:10px; padding:9px 10px;
    position:relative; transition: box-shadow .15s, transform .15s;
  }
  .card.dragging{ opacity:0.35; }
  .card.drag-ghost{
    position:fixed; z-index:200; pointer-events:none; box-shadow:0 12px 30px -6px rgba(38,34,31,0.35);
    transform: rotate(-1.2deg) scale(1.02); background:var(--surface);
  }
  .card-top{ display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .handle{
    cursor:grab; color:var(--muted); font-size:13px; padding:2px 4px; touch-action:none; line-height:1;
    user-select:none;
  }
  .handle:active{ cursor:grabbing; }
  .cat-tag{
    font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:999px; border:none; outline:none;
    font-family:'Noto Sans TC',sans-serif;
  }
  .cat-tag.交通{ background:var(--indigo); color:#fff; }
  .cat-tag.景點{ background:var(--matcha); color:#fff; }
  .cat-tag.餐廳{ background:var(--vermilion); color:#fff; }
  .cat-tag.住宿{ background:var(--ochre); color:#fff; }
  .cat-tag.其他{ background:#9C9284; color:#fff; }
  .time-input{
    border:none; background:transparent; font-family:'JetBrains Mono',monospace; font-size:11.5px;
    color:var(--muted); width:52px; outline:none; padding:2px;
  }
  .time-input:focus{ background:var(--surface); border-radius:4px; }
  .card-dup{ margin-left:auto; border:none; background:none; color:var(--muted); font-size:12px; padding:2px 5px; border-radius:4px; }
  .card-dup:hover{ color:var(--indigo); background:var(--surface); }
  .card-del{ border:none; background:none; color:var(--muted); font-size:14px; padding:2px 4px; }
  .card-del:hover{ color:var(--vermilion); }
  .title-input{
    border:none; background:transparent; width:100%; font-size:13.5px; outline:none;
    padding:2px 2px 4px; font-weight:500;
  }
  .title-input:focus{ background:var(--surface); border-radius:4px; }
  .title-input::placeholder{ color:var(--muted); font-weight:400; }
  .card-bottom{ display:flex; align-items:center; gap:6px; }
  .cost-wrap{ display:flex; align-items:center; gap:3px; flex-shrink:0; }
  .cost-input{

<script>

(function(){
  "use strict";

  // ---------- Local storage persistence ----------
  // Trip text data (itinerary, budget, etc.) is saved to this browser's
  // localStorage. No network/cloud sync — the data lives only on this
  // device/browser, but survives page refreshes and closing/reopening the tab.
  const TRIP_DATA_PREFIX = "trip-data-v1-";
  const INDEX_KEY = "trip-index-v1";

  // ---------- IndexedDB: stores the actual bytes of every attachment ----------
  // (images / PDFs / text files). IndexedDB has a much larger quota than
  // localStorage (typically hundreds of MB+), so attachment content lives
  // here; only lightweight metadata {id,name,kind,size} is kept in the trip's
  // localStorage record.
  const IDB_NAME = "travel-journal-files-v1";
  const IDB_STORE = "files";
  let idbPromise = null;

  function getIDB(){
    if(idbPromise) return idbPromise;
    idbPromise = new Promise((resolve, reject)=>{
      if(!window.indexedDB){ reject(new Error("IndexedDB not supported")); return; }
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = ()=>{
        const dbi = req.result;
        if(!dbi.objectStoreNames.contains(IDB_STORE)){
          dbi.createObjectStore(IDB_STORE, { keyPath: "id" });
        }
      };
      req.onsuccess = ()=> resolve(req.result);
      req.onerror = ()=> reject(req.error);
    });
    return idbPromise;
  }

  // record shape: { id, kind: 'image'|'pdf'|'txt', content }
  // content is a data URL for image/pdf, or a plain text string for txt.
  async function idbPutFile(record){
    const dbi = await getIDB();
    return new Promise((resolve, reject)=>{
      const tx = dbi.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put(record);
      tx.oncomplete = ()=> resolve(true);
      tx.onerror = ()=> reject(tx.error);
    });
  }

  async function idbGetFile(id){
    const dbi = await getIDB();
    return new Promise((resolve, reject)=>{
      const tx = dbi.transaction(IDB_STORE, "readonly");
      const req = tx.objectStore(IDB_STORE).get(id);
      req.onsuccess = ()=> resolve(req.result || null);
      req.onerror = ()=> reject(req.error);
    });
  }

  async function idbDeleteFile(id){
    const dbi = await getIDB();
    return new Promise((resolve, reject)=>{
      const tx = dbi.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).delete(id);
      tx.oncomplete = ()=> resolve(true);
      tx.onerror = ()=> reject(tx.error);
    });
  }

  // small in-memory cache so re-rendering the same attachment list within a
  // session doesn't have to hit storage again just to redraw a thumbnail.
  const attachmentContentCache = new Map();

  // ---------- fallback storage ----------
  // Some environments (e.g. the page opened directly via file://, or a
  // restrictive sandboxed embed) block or silently hang IndexedDB. To make
  // sure uploads never just "disappear" with no feedback, we probe IndexedDB
  // once (with a timeout so a hang can't freeze the upload forever) and, if
  // it isn't usable, transparently fall back to storing each attachment's
  // content under its own localStorage key instead.
  let idbAvailable = null;
  let fallbackNoticeShown = false;
  const FALLBACK_PREFIX = "att-fallback-v1-";

  function withTimeout(promise, ms, errMsg){
    return Promise.race([
      promise,
      new Promise((_, reject)=> setTimeout(()=> reject(new Error(errMsg || "timeout")), ms))
    ]);
  }

  async function ensureIdbReady(){
    if(idbAvailable !== null) return idbAvailable;
    try{
      await withTimeout(getIDB(), 3000, "IndexedDB 開啟逾時");
      idbAvailable = true;
    }catch(e){
      console.error("IndexedDB 無法使用，改用瀏覽器 localStorage 備援方式儲存檔案", e);
      idbAvailable = false;
      if(!fallbackNoticeShown){
        fallbackNoticeShown = true;
        showAlert("這個瀏覽器或開啟方式（例如直接用「開啟檔案」打開網頁）目前無法使用擴充儲存空間，已自動切換成備援模式。備援模式容量比較小，建議圖片/PDF 數量與大小盡量精簡，或改用網址（http/https）方式開啟這個頁面。");
      }
    }
    return idbAvailable;
  }

  async function storeAttachmentContent(id, kind, content){
    const ok = await ensureIdbReady();
    if(ok){
      await idbPutFile({ id, kind, content });
      return;
    }
    localStorage.setItem(FALLBACK_PREFIX + id, JSON.stringify({ kind, content }));
  }

  async function fetchAttachmentContent(id){
    const ok = await ensureIdbReady();
    if(ok) return await idbGetFile(id);
    try{
      const raw = localStorage.getItem(FALLBACK_PREFIX + id);
      return raw ? JSON.parse(raw) : null;
    }catch(e){
      console.error("備援讀取失敗", e);
      return null;
    }
  }

  async function removeAttachmentContent(id){
    const ok = await ensureIdbReady();
    if(ok){
      try{ await idbDeleteFile(id); }catch(e){ console.error(e); }
    }
    try{ localStorage.removeItem(FALLBACK_PREFIX + id); }catch(e){ /* ignore */ }
  }

  async function loadAttachmentContent(id){
    if(attachmentContentCache.has(id)) return attachmentContentCache.get(id);
    const rec = await fetchAttachmentContent(id);
    if(rec) attachmentContentCache.set(id, rec);
    return rec;
  }

  // Deletes one or more attachments' content from wherever it's stored
  // (IndexedDB and/or the localStorage fallback) and clears the local cache.
  async function idbDeleteFiles(ids){
    for(const id of (ids||[])){
      try{ await removeAttachmentContent(id); }catch(e){ console.error("刪除本機檔案資料失敗", e); }
      attachmentContentCache.delete(id);
    }
  }

  const PERIODS = ["早上","下午","晚上"];
  const CATEGORIES = ["交通","景點","餐廳","住宿","其他"];
  const MODES = [
    {v:"once", label:"一次性"},
    {v:"perDay", label:"每人每天"},
    {v:"perNight", label:"每人每晚"}
  ];

  let uid = 1;
  function nid(prefix){ return prefix + "_" + (uid++) + "_" + Math.random().toString(36).slice(2,7); }

  // A brand-new folder starts completely empty — no categories, one blank day.
  function blankTripState(name){
    return {
      name: name || "未命名行程",
      days: 1,
      people: 1,
      startDate: "",
      endDate: "",
      notes: "",
      attachments: [],
      categories: [
        { id: nid("cat"), name:"機票", unitCost:0, mode:"once" },
        { id: nid("cat"), name:"住宿", unitCost:0, mode:"perNight" },
        { id: nid("cat"), name:"用餐", unitCost:0, mode:"perDay" },
        { id: nid("cat"), name:"交通", unitCost:0, mode:"perDay" },
        { id: nid("cat"), name:"門票", unitCost:0, mode:"perDay" }
      ],
      itinerary: [
        { id: nid("day"), date:"", weekday:"", city:"", stay:{ name:"", cost:0, note:"" }, files:[], blocks:[] }
      ]
    };
  }

  // Ensures older saved trips (from before notes/attachments existed) get sane defaults.
  function backfillTrip(trip){
    if(typeof trip.notes !== "string") trip.notes = "";
    if(!Array.isArray(trip.attachments)) trip.attachments = [];
    (trip.itinerary||[]).forEach(day=>{
      if(!day.stay) day.stay = { name:"", cost:0, note:"" };
      if(!Array.isArray(day.files)) day.files = [];
      (day.blocks||[]).forEach(b=>{
        if(!Array.isArray(b.files)) b.files = [];
      });
    });
    return trip;
  }

  // Older saves (before the IndexedDB migration) stored each image's full
  // base64 data URL directly inside the attachment object. This moves any
  // such leftover bytes into IndexedDB and strips them out of the JSON that
  // lives in localStorage, so the trip's metadata stays lightweight.
  async function migrateLegacyAttachmentList(list){
    if(!Array.isArray(list)) return false;
    let changed = false;
    for(const att of list){
      if(att && typeof att.dataUrl === "string" && !att.kind){
        try{
          await storeAttachmentContent(att.id, "image", att.dataUrl);
        }catch(e){ console.error("搬移舊圖片資料失敗", e); }
        att.kind = "image";
        delete att.dataUrl;
        changed = true;
      }
    }
    return changed;
  }

  async function migrateLegacyTrip(trip){
    let changed = false;
    if(await migrateLegacyAttachmentList(trip.attachments)) changed = true;
    for(const day of (trip.itinerary||[])){
      if(await migrateLegacyAttachmentList(day.files)) changed = true;
      for(const b of (day.blocks||[])){
        if(await migrateLegacyAttachmentList(b.files)) changed = true;
      }
    }
    return changed;
  }

  let state = null;          // the currently-open trip's data
  let currentTripId = null;  // id of the currently-open trip
  let tripIndex = [];        // lightweight list for the folder view: [{id, name, days, people, dateLabel, updatedAt}]
  let saveTimer = null;

  function fmtMoney(n){
    n = Math.round(n || 0);
    return "NT$ " + n.toLocaleString("en-US");
  }

  // ---------- persistence ----------
  function indexEntryFrom(id, tripState){
    return {
      id,
      name: tripState.name || "未命名行程",
      days: tripState.days || 0,
      people: tripState.people || 0,
      dateLabel: (tripState.itinerary && tripState.itinerary[0] && tripState.itinerary[0].date) || tripState.startDate || "",
      updatedAt: Date.now()
    };
  }

  // The folder list ("which trips does this browser know about") lives in localStorage.
  function loadTripIndex(){
    try{
      const raw = localStorage.getItem(INDEX_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        if(Array.isArray(parsed)) return parsed;
      }
    }catch(e){
      console.error("讀取本機行程清單失敗", e);
    }
    return [];
  }

    try{

      console.error("寫入本機行程清單失敗", e);

  // Reads one trip's full data from localStorage.
  async function loadTrip(id){
    try{
      const raw = localStorage.getItem(TRIP_DATA_PREFIX + id);
      if(raw){
        const parsed = JSON.parse(raw);
        if(parsed && Array.isArray(parsed.itinerary)){
          const trip = backfillTrip(parsed);
          const migrated = await migrateLegacyTrip(trip);
          if(migrated){
            try{ localStorage.setItem(TRIP_DATA_PREFIX + id, JSON.stringify(trip)); }
            catch(e){ console.error("寫回搬移後的行程資料失敗", e); }
          }
          return trip;
        }
      }
    }catch(e){
      console.error("讀取行程資料失敗", e);
      await showAlert("讀取行程資料失敗，本機儲存的資料可能已損毀。");
    }
    return blankTripState();
  }

  // Keeps the in-memory folder-list entry (name/days/people/date) accurate the
  // instant something changes.
  function syncIndexEntryNow(){
    if(!currentTripId || !state) return;
    const entry = tripIndex.find(t=>t.id===currentTripId);
    if(!entry) return;
    entry.name = state.name || "未命名行程";
    entry.days = state.days || 0;
    entry.people = state.people || 0;
    entry.dateLabel = (state.itinerary[0] && state.itinerary[0].date) || state.startDate || "";
    entry.updatedAt = Date.now();
  }

  function scheduleSave(){
    syncIndexEntryNow();
    saveTripIndexLocal();
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveState, 400);
  }

  async function saveState(){
    if(!currentTripId || !state) return;
    syncIndexEntryNow();
    saveTripIndexLocal();
    // Attachment bytes now live in IndexedDB, not here — this payload is just
    // text/metadata, so it should stay tiny no matter how many files are attached.
    const payload = JSON.stringify(state);
    try{
      localStorage.setItem(TRIP_DATA_PREFIX + currentTripId, payload);
      flashSaved();
    }catch(e){
      console.error("儲存失敗", e);
      flashSaveError("⚠ 儲存失敗，瀏覽器本機空間可能已滿");
    }
  }

  // ---------- custom confirm/alert (native browser dialogs are blocked in this sandboxed iframe) ----------
  function showConfirm(message){
    return new Promise(resolve=>{
      const overlay = document.getElementById("modalOverlay");
      document.getElementById("modalMessage").textContent = message;
      const cancelBtn = document.getElementById("modalCancelBtn");
      const confirmBtn = document.getElementById("modalConfirmBtn");
      cancelBtn.style.display = "";
      confirmBtn.textContent = "確定";
      overlay.style.display = "flex";
      function cleanup(result){
        overlay.style.display = "none";
        cancelBtn.removeEventListener("click", onCancel);
        confirmBtn.removeEventListener("click", onConfirm);
        overlay.removeEventListener("click", onOverlay);
        resolve(result);
      }
      function onCancel(){ cleanup(false); }
      function onConfirm(){ cleanup(true); }
      function onOverlay(e){ if(e.target === overlay) cleanup(false); }
      cancelBtn.addEventListener("click", onCancel);
      confirmBtn.addEventListener("click", onConfirm);
      overlay.addEventListener("click", onOverlay);
    });
  }

  function showAlert(message){
    return new Promise(resolve=>{
      const overlay = document.getElementById("modalOverlay");
      document.getElementById("modalMessage").textContent = message;
      const cancelBtn = document.getElementById("modalCancelBtn");
      const confirmBtn = document.getElementById("modalConfirmBtn");
      cancelBtn.style.display = "none";
      confirmBtn.textContent = "好的";
      overlay.style.display = "flex";
      function cleanup(){
        overlay.style.display = "none";
        confirmBtn.removeEventListener("click", onOk);
        overlay.removeEventListener("click", onOverlay);
        resolve();
      }
      function onOk(){ cleanup(); }
      function onOverlay(e){ if(e.target === overlay) cleanup(); }
      confirmBtn.addEventListener("click", onOk);
      overlay.addEventListener("click", onOverlay);
    });
  }

  // ---------- attachments (image / pdf / txt) ----------
  // Images are downscaled + re-encoded as JPEG (still kept as a data URL) to
  // save space; PDFs are read as-is into a data URL (can't be compressed);
  // text files are read as plain text. The resulting "content" is stored in
  // IndexedDB (see idbPutFile above) — only lightweight metadata
  // {id, name, size, kind} ever touches localStorage.
  function detectAttKind(file){
    const name = (file.name || "").toLowerCase();
    if(file.type && file.type.indexOf("image/") === 0) return "image";
    if(file.type === "application/pdf" || name.endsWith(".pdf")) return "pdf";
    if((file.type && file.type.indexOf("text/") === 0) || name.endsWith(".txt")) return "txt";
    return null;
  }

  function fileToCompressedDataUrl(file, maxDim, quality){
    maxDim = maxDim || 1280; quality = quality || 0.82;
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onerror = ()=> reject(new Error("read failed"));
      reader.onload = ()=>{
        const img = new Image();
        img.onerror = ()=> reject(new Error("decode failed"));
        img.onload = ()=>{
          let w = img.width, h = img.height;
          if(w > maxDim || h > maxDim){
            if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; }
            else{ w = Math.round(w * maxDim / h); h = maxDim; }
          }
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function readFileAsDataURL(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onerror = ()=> reject(new Error("read failed"));
      reader.onload = ()=> resolve(reader.result);
      reader.readAsDataURL(file);
    });
  }

  function readFileAsText(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onerror = ()=> reject(new Error("read failed"));
      reader.onload = ()=> resolve(reader.result);
      reader.readAsText(file);
    });
  }

  function estimateContentKB(content){
    if(typeof content !== "string") return 0;
    const isDataUrl = content.indexOf("data:") === 0;
    return Math.round((content.length * (isDataUrl ? 0.75 : 1)) / 1024);
  }

  // Reads (and compresses, for images) a FileList, stores each file's bytes in
  // IndexedDB, and pushes lightweight metadata into targetArray. Calls onDone when finished.
  async function addFilesToArray(fileList, targetArray, onDone){
    const files = Array.from(fileList || []);
    for(const file of files){
      const kind = detectAttKind(file);
      if(!kind){
        await showAlert("「" + file.name + "」的檔案格式目前不支援，只能上傳圖片、PDF 或文字檔（.txt）。");
        continue;
      }
      try{
        let content;
        if(kind === "image") content = await fileToCompressedDataUrl(file);
        else if(kind === "pdf") content = await readFileAsDataURL(file);
        else content = await readFileAsText(file);

        const kb = estimateContentKB(content);
        if(kb > 4000){
          const ok = await showConfirm("「" + file.name + "」約 " + kb + "KB，檔案偏大，確定要加入嗎？");
          if(!ok) continue;
        }
        const id = nid("att");
        await storeAttachmentContent(id, kind, content);
        targetArray.push({ id, name: file.name, size: kb, kind });
      }catch(e){
        console.error(e);
        await showAlert("處理「" + file.name + "」時發生錯誤，請再試一次。");
      }
    }
    onDone();
  }

    const grid = document.createElement("div");
    grid.className = "attachment-grid";

        thumb.classList.remove("loading");
        const kind = (rec && rec.kind) || att.kind || "image";
        const content = rec ? rec.content : null;

        if(!content){
          thumb.textContent = "⚠";

          return;

        if(kind === "image"){

          img.src = content; img.alt = att.name; img.title = att.name;
          img.addEventListener("click", ()=> openLightbox(content, att.name));

  // Converts a PDF data URL to a Blob URL and opens it in a new tab (data:
  // URLs can hit size/security limits when opened directly in some browsers).
  function openPdfInNewTab(dataUrl, name){
    try{
      const commaIdx = dataUrl.indexOf(",");
      const meta = dataUrl.slice(0, commaIdx);
      const base64 = dataUrl.slice(commaIdx + 1);
      const mimeMatch = meta.match(/data:(.*?);base64/);
      const mime = mimeMatch ? mimeMatch[1] : "application/pdf";
      const binary = atob(base64);
      const arr = new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) arr[i] = binary.charCodeAt(i);
      const blob = new Blob([arr], { type: mime });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank");
      setTimeout(()=> URL.revokeObjectURL(url), 60000);
    }catch(e){
      console.error("開啟 PDF 失敗", e);
      window.open(dataUrl, "_blank");
    }
  }

  }

  // ---------- date helpers ----------
  const WEEKDAY_NAMES = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];



  function parseISO(iso){ return new Date(iso + "T00:00:00"); }
  function toISO(d){
    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
    return y+"-"+m+"-"+day;
  }
  function toDisplayDate(d){
    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
    return y+"/"+m+"/"+day;
  }
  function weekdayOf(d){ return WEEKDAY_NAMES[d.getDay()]; }

  // Sets state.days to match the itinerary's current length, and refreshes endDate accordingly.
  function daysBetweenISO(startISO, endISO){
    return Math.round((parseISO(endISO) - parseISO(startISO)) / 86400000) + 1;
  }

  // Regenerates itinerary day count + each day's date/weekday to match state.startDate + state.days.
  // Growing adds blank days at the end; shrinking asks for confirmation if it would delete content.
  async function syncItineraryToDates(){
    if(!state.startDate) return true;
    const start = parseISO(state.startDate);
    const targetDays = state.days;

    if(state.itinerary.length > targetDays){
      const removeCount = state.itinerary.length - targetDays;
      const trailing = state.itinerary.slice(targetDays);
      const hasContent = trailing.some(d => d.blocks.length > 0 || (d.city && d.city.trim()));
      if(hasContent){
        const ok = await showConfirm("新的天數比目前行程少，會刪除最後 " + removeCount + " 天已輸入的行程內容，確定要繼續嗎？");
        if(!ok) return false;
      }
      state.itinerary = state.itinerary.slice(0, targetDays);
    } else if(state.itinerary.length < targetDays){
      const lastCity = state.itinerary.length ? state.itinerary[state.itinerary.length-1].city : "";
      for(let i = state.itinerary.length; i < targetDays; i++){
        state.itinerary.push({ id: nid("day"), date:"", weekday:"", city:"", stay:{name:"",cost:0,note:""}, files:[], blocks:[] });
      }
    }

    state.itinerary.forEach((day, i) => {
      const d = new Date(start);
      d.setDate(d.getDate() + i);
      day.date = toDisplayDate(d);
      day.weekday = weekdayOf(d);
    });

    const end = new Date(start);
    end.setDate(end.getDate() + targetDays - 1);
    state.endDate = toISO(end);
    return true;
  }

  // Relabels existing itinerary days sequentially from state.startDate, without adding/removing days.
  // Used after manually adding/removing a day card so dates stay contiguous.
  function resequenceDates(){
    state.days = state.itinerary.length;
    if(!state.startDate) return;
    const start = parseISO(state.startDate);
    state.itinerary.forEach((day, i) => {
      const d = new Date(start);
      d.setDate(d.getDate() + i);
      day.date = toDisplayDate(d);
      day.weekday = weekdayOf(d);
    });
    const end = new Date(start);
    end.setDate(end.getDate() + state.days - 1);
    state.endDate = toISO(end);
  }

  async function applyDateRange(startISO, endISO){
    if(!startISO || !endISO) return;
    const diff = daysBetweenISO(startISO, endISO);
    if(diff < 1){
      await showAlert("回程日期必須晚於或等於出發日期");
      render();
      return;
    }
    const prevStart = state.startDate, prevEnd = state.endDate, prevDays = state.days;
    state.startDate = startISO;
    state.endDate = endISO;
    state.days = diff;
    const ok = await syncItineraryToDates();
    if(!ok){
      state.startDate = prevStart; state.endDate = prevEnd; state.days = prevDays;
    }
    render();
    scheduleSave();
  }

  // ---------- calculations ----------
  function categorySubtotal(cat){
    const days = Math.max(state.days||0, 0);
    const nights = Math.max(days - 1, 0);
    const people = Math.max(state.people||0, 0);
    let mult = 1;
    if(cat.mode === "perDay") mult = days;
    else if(cat.mode === "perNight") mult = nights;
    const perPerson = (cat.unitCost||0) * mult;
    return perPerson * people;
  }

  function budgetTotal(){
    return state.categories.reduce((s,c)=> s + categorySubtotal(c), 0);
  }

  function actualTotal(){
    let total = 0;
    state.itinerary.forEach(d => {
      d.blocks.forEach(b => total += (Number(b.cost)||0));
      if(d.stay) total += Number(d.stay.cost)||0;
    });
    return total;
  }

  function renderDayNav(){

    const topOffset = (topbar ? topbar.getBoundingClientRect().height : 130) + 16;

    setActiveDayChip(dayId);

  let dayObserver = null;
  function setupDayObserver(){
    if(dayObserver) dayObserver.disconnect();
    const topbar = document.querySelector(".topbar");
    const topOffset = topbar ? topbar.getBoundingClientRect().height + 10 : 140;
    dayObserver = new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting) setActiveDayChip(entry.target.dataset.dayId);
      });
    }, { root:null, rootMargin: "-" + Math.round(topOffset) + "px 0px -70% 0px", threshold: 0 });
    document.querySelectorAll(".day").forEach(el=> dayObserver.observe(el));
  }

  function bindDayNavScroll(){
    const nav = document.getElementById("dayNav");
    if(!nav || nav.dataset.scrollBound) return;
    nav.dataset.scrollBound = "1";

    // vertical wheel/trackpad input scrolls the day list horizontally
    nav.addEventListener("wheel", (e)=>{
      if(Math.abs(e.deltaY) <= Math.abs(e.deltaX)) return;
      e.preventDefault();
      nav.scrollLeft += e.deltaY;
    }, { passive:false });

    // click-and-drag (mouse or touch) to scroll — listens on window (not pointer
    // capture) so a plain click on a chip still fires normally afterwards.
    let isDown = false, startX = 0, startScroll = 0, moved = 0;

    function onMove(e){
      if(!isDown) return;
      const dx = e.clientX - startX;
      moved = Math.max(moved, Math.abs(dx));
      nav.scrollLeft = startScroll - dx;
    }
    function onUp(){
      if(!isDown) return;
      isDown = false;
      nav.classList.remove("grabbing");
      nav.dataset.dragged = moved > 5 ? "1" : "0";
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      setTimeout(()=>{ nav.dataset.dragged = "0"; }, 50);
    }

    nav.addEventListener("pointerdown", (e)=>{
      isDown = true; moved = 0;
      startX = e.clientX; startScroll = nav.scrollLeft;
      nav.classList.add("grabbing");
      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerup", onUp);
    });
  }

  // ---------- drag & drop (pointer events, works on touch + mouse) ----------
  let dragCtx = null;

  function startDrag(e, day, block, cardEl){
    e.preventDefault();
    const rect = cardEl.getBoundingClientRect();
    const ghost = cardEl.cloneNode(true);
    ghost.classList.add("drag-ghost");
    ghost.style.width = rect.width + "px";
    ghost.style.left = rect.left + "px";
    ghost.style.top = rect.top + "px";
    document.body.appendChild(ghost);

    cardEl.classList.add("dragging");

    dragCtx = {
      block, day, cardEl, ghost,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
      startX: e.clientX, startY: e.clientY
    };

    window.addEventListener("pointermove", onDragMove);
    window.addEventListener("pointerup", onDragEnd);
  }

  function onDragMove(e){
    if(!dragCtx) return;
    dragCtx.ghost.style.left = (e.clientX - dragCtx.offsetX) + "px";
    dragCtx.ghost.style.top = (e.clientY - dragCtx.offsetY) + "px";
    dragCtx.ghost.style.display = "none";
    const under = document.elementFromPoint(e.clientX, e.clientY);
    dragCtx.ghost.style.display = "";
    if(!under) return;
    const cardsWrap = under.closest(".cards");
    clearPlaceholders();
    if(cardsWrap){
      const targetCard = under.closest(".card");
      const placeholder = document.createElement("div");
      placeholder.className = "placeholder-slot";
      if(targetCard && targetCard.parentElement === cardsWrap && targetCard !== dragCtx.cardEl){
        const tRect = targetCard.getBoundingClientRect();
        const before = e.clientY < tRect.top + tRect.height/2;
        cardsWrap.insertBefore(placeholder, before ? targetCard : targetCard.nextSibling);
      } else {
        cardsWrap.appendChild(placeholder);
      }
      dragCtx.dropWrap = cardsWrap;
    } else {
      dragCtx.dropWrap = null;
    }
  }

  function clearPlaceholders(){
    document.querySelectorAll(".placeholder-slot").forEach(p=>p.remove());
  }

  function onDragEnd(e){
    if(!dragCtx) return;
    window.removeEventListener("pointermove", onDragMove);
    window.removeEventListener("pointerup", onDragEnd);

    const { block, day, cardEl, ghost, dropWrap } = dragCtx;
    ghost.remove();
    cardEl.classList.remove("dragging");

    if(dropWrap){
      const newDayId = dropWrap.dataset.dayId;
      const newPeriod = dropWrap.dataset.period;
      const newDay = state.itinerary.find(d=>d.id===newDayId);

      // figure out insertion index among real cards (excluding the dragged card + placeholder)
      const placeholder = dropWrap.querySelector(".placeholder-slot");
      let insertIndex = 0;
      if(placeholder){
        for(const child of Array.from(dropWrap.children)){
          if(child === placeholder) break;
          if(child.classList.contains("card") && child.dataset.blockId !== block.id){
            insertIndex++;
          }
        }
      }

      // remove block from its current day (mutates the shared day object if newDay === day)
      day.blocks = day.blocks.filter(b=>b.id!==block.id);
      block.period = newPeriod;

      const periodBlocks = newDay.blocks.filter(b=>b.period===newPeriod);
      const otherBlocks = newDay.blocks.filter(b=>b.period!==newPeriod);
      periodBlocks.splice(insertIndex, 0, block);
      newDay.blocks = otherBlocks.concat(periodBlocks);
    }

    clearPlaceholders();
    dragCtx = null;
    renderDays();
    renderStats();
    scheduleSave();
  }

  // ---------- whole-day drag & drop ----------
  // Dragging a day card to a new position moves its content (city, blocks, stay) there;
  // since each day's date/weekday is always derived from its position + startDate,
  // the day left behind simply "inherits" whatever date that slot now represents.
  let dayDragCtx = null;

  function startDayDrag(e, day, dayEl){
    e.preventDefault();
    const idx = state.itinerary.findIndex(d=>d.id===day.id);
    const rect = dayEl.getBoundingClientRect();

    const ghost = document.createElement("div");
    ghost.className = "day-drag-ghost serif";
    ghost.style.width = Math.min(rect.width, 320) + "px";
    ghost.style.left = rect.left + "px";
    ghost.style.top = rect.top + "px";
    const label = "Day " + (idx+1) + (day.date ? " ・ " + day.date : "") + (day.city ? "　" + day.city : "");
    ghost.textContent = label;
    document.body.appendChild(ghost);

    dayEl.classList.add("day-dragging-source");

    dayDragCtx = {
      day, dayEl, ghost,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top
    };

    window.addEventListener("pointermove", onDayDragMove);
    window.addEventListener("pointerup", onDayDragEnd);
  }

  function clearDayPlaceholder(){
    document.querySelectorAll(".day-placeholder").forEach(p=>p.remove());
  }

  function onDayDragMove(e){
    if(!dayDragCtx) return;
    dayDragCtx.ghost.style.left = (e.clientX - dayDragCtx.offsetX) + "px";
    dayDragCtx.ghost.style.top = (e.clientY - dayDragCtx.offsetY) + "px";

    dayDragCtx.ghost.style.display = "none";
    const under = document.elementFromPoint(e.clientX, e.clientY);
    dayDragCtx.ghost.style.display = "";

    clearDayPlaceholder();
    const container = document.getElementById("daysContainer");
    if(!under) return;

    const targetDay = under.closest(".day");
    const placeholder = document.createElement("div");
    placeholder.className = "day-placeholder";

    if(targetDay && targetDay !== dayDragCtx.dayEl && targetDay.parentElement === container){
      const tRect = targetDay.getBoundingClientRect();
      const before = e.clientY < tRect.top + tRect.height/2;
      container.insertBefore(placeholder, before ? targetDay : targetDay.nextSibling);
    } else if(under === container || container.contains(under)){
      container.appendChild(placeholder);
    }
  }

  function onDayDragEnd(e){
    if(!dayDragCtx) return;
    window.removeEventListener("pointermove", onDayDragMove);
    window.removeEventListener("pointerup", onDayDragEnd);

    const { day, dayEl, ghost } = dayDragCtx;
    ghost.remove();
    dayEl.classList.remove("day-dragging-source");

    const container = document.getElementById("daysContainer");
    const placeholder = container.querySelector(".day-placeholder");
    if(placeholder){
      let newIndex = 0;
      for(const child of Array.from(container.children)){
        if(child === placeholder) break;
        if(child.classList.contains("day") && child !== dayEl) newIndex++;
      }
      const oldIndex = state.itinerary.findIndex(d=>d.id===day.id);
      if(oldIndex !== -1 && oldIndex !== newIndex){
        state.itinerary.splice(oldIndex, 1);
        state.itinerary.splice(newIndex, 0, day);
        resequenceDates();
      }
    }

    clearDayPlaceholder();
    dayDragCtx = null;
    render();
    scheduleSave();
  }

      dupBtn.addEventListener("click", (e)=>{
        e.stopPropagation();
        duplicateTrip(entry.id, entry.name);
      });
      card.appendChild(dupBtn);

      const delBtn = document.createElement("button");
      delBtn.className = "folder-card-del";
      delBtn.textContent = "×";
      delBtn.title = "刪除這個行程";
      delBtn.addEventListener("click", (e)=>{
        e.stopPropagation();
        deleteTrip(entry.id, entry.name);
      });
      card.appendChild(delBtn);

      const name = document.createElement("div");
      name.className = "folder-card-name";
      name.textContent = entry.name || "未命名行程";
      card.appendChild(name);

      const meta = document.createElement("div");
      meta.className = "folder-card-meta";
      meta.innerHTML =
        "<span>" + (entry.days||0) + " 天</span>" +
        "<span>" + (entry.people||0) + " 人</span>" +
        (entry.dateLabel ? "<span>" + entry.dateLabel + "</span>" : "");
      card.appendChild(meta);

      card.addEventListener("click", ()=> openTrip(entry.id));
      grid.appendChild(card);
    });

    const addCard = document.createElement("button");
    addCard.className = "folder-add-card";
    addCard.innerHTML = "<span style='font-size:22px;line-height:1;'>＋</span><span>新增行程資料夾</span>";
    addCard.addEventListener("click", createNewTrip);
    grid.appendChild(addCard);
  }

  async function createNewTrip(){
    const id = nid("trip");
    const blank = blankTripState("未命名行程 " + (tripIndex.length + 1));
    tripIndex.push(indexEntryFrom(id, blank));
    saveTripIndexLocal();
    renderFolderGrid();
    try{
      localStorage.setItem(TRIP_DATA_PREFIX + id, JSON.stringify(blank));
    }catch(e){
      console.error("新增行程失敗", e);
      await showAlert("新增行程時發生錯誤，瀏覽器本機空間可能已滿。");
    }
  }

  // Copies a list of attachments to brand-new ids, including their actual
  // bytes in IndexedDB (not just the metadata) so the clone is independent.
  async function cloneAttachmentList(list){
    const result = [];
    for(const att of (list||[])){
      const newId = nid("att");
      try{
        const rec = await loadAttachmentContent(att.id);
        if(rec) await storeAttachmentContent(newId, rec.kind, rec.content);
      }catch(e){ console.error("複製檔案內容失敗", e); }
      result.push(Object.assign({}, att, { id: newId }));
    }
    return result;
  }

  // Deep-clones a single itinerary block (景點/交通/餐廳/住宿 card) and regenerates its ids.
  async function cloneBlockWithNewIds(block){
    const clone = JSON.parse(JSON.stringify(block));
    clone.id = nid("c");
    clone.files = await cloneAttachmentList(clone.files);
    return clone;
  }

  // Deep-clones a single day and regenerates its internal ids (blocks + files).
  async function cloneDayWithNewIds(day){
    const clone = JSON.parse(JSON.stringify(day));
    clone.id = nid("day");
    const newBlocks = [];
    for(const b of (clone.blocks||[])){
      b.id = nid("c");
      b.files = await cloneAttachmentList(b.files);
      newBlocks.push(b);
    }
    clone.blocks = newBlocks;
    clone.files = await cloneAttachmentList(clone.files);
    return clone;
  }

  // Deep-clones a trip and regenerates every internal id so it's fully independent
  // from the original (categories, days, blocks, and every level of attachments).
  async function cloneTripWithNewIds(trip){
    const clone = JSON.parse(JSON.stringify(trip));
    (clone.categories||[]).forEach(c=>{ c.id = nid("cat"); });
    clone.attachments = await cloneAttachmentList(clone.attachments);
    const newItinerary = [];
    for(const day of (clone.itinerary||[])){
      day.id = nid("day");
      const newBlocks = [];
      for(const b of (day.blocks||[])){
        b.id = nid("c");
        b.files = await cloneAttachmentList(b.files);
        newBlocks.push(b);
      }
      day.blocks = newBlocks;
      day.files = await cloneAttachmentList(day.files);
      newItinerary.push(day);
    }
    clone.itinerary = newItinerary;
    return clone;
  }

  // Collects every attachment id referenced anywhere in a trip (trip-level,
  // per-day, and per-card), used when wiping a trip's IndexedDB records.
  function collectTripAttachmentIds(trip){
    const ids = [];
    (trip.attachments||[]).forEach(a=> ids.push(a.id));
    (trip.itinerary||[]).forEach(day=>{
      (day.files||[]).forEach(f=> ids.push(f.id));
      (day.blocks||[]).forEach(b=> (b.files||[]).forEach(f=> ids.push(f.id)));
    });
    return ids;
  }

  async function duplicateTrip(id, name){
    const original = await loadTrip(id);
    const clone = backfillTrip(await cloneTripWithNewIds(original));
    clone.name = (name || original.name || "未命名行程") + "（複製）";
    const newId = nid("trip");
    tripIndex.push(indexEntryFrom(newId, clone));
    saveTripIndexLocal();
    renderFolderGrid();
    try{
      localStorage.setItem(TRIP_DATA_PREFIX + newId, JSON.stringify(clone));
    }catch(e){ console.error("複製行程失敗", e); }
  }

  async function deleteTrip(id, name){
    const ok = await showConfirm("確定要刪除「" + (name || "這個行程") + "」嗎？此動作無法復原，包含所有已上傳的圖片與檔案。");
    if(!ok) return;
    tripIndex = tripIndex.filter(t=>t.id!==id);
    saveTripIndexLocal();
    renderFolderGrid();
    try{
      const trip = await loadTrip(id);
      await idbDeleteFiles(collectTripAttachmentIds(trip));
    }catch(e){ console.error("清除附件失敗", e); }
    try{
      localStorage.removeItem(TRIP_DATA_PREFIX + id);
    }catch(e){ console.error("刪除行程失敗", e); }
  }

  async function openTrip(id){
    state = await loadTrip(id);
    currentTripId = id;
    document.title = (state.name || "旅程手帳") + "｜行程手帳";
    const url = new URL(window.location.href);
    url.searchParams.set("trip", id);
    window.history.replaceState({}, "", url);
    showFolderView(false);
    showTripView(true);
    window.scrollTo(0,0);
    render();
  }

  function backToFolders(){
    clearTimeout(saveTimer);
    if(currentTripId) saveState();
    currentTripId = null;
    state = null;
    const url = new URL(window.location.href);
    url.searchParams.delete("trip");
    window.history.replaceState({}, "", url);
    showTripView(false);
    showFolderView(true);
    renderFolderGrid();
  }

  // ---------- init ----------
  async function init(){
    tripIndex = loadTripIndex();
    bindGlobalControls();
    bindDayNavScroll();
    document.getElementById("backToFoldersBtn").addEventListener("click", backToFolders);

    // If opened via a link (?trip=xxxx) that this browser has data for, jump
    // straight into that trip.
    const params = new URLSearchParams(window.location.search);
    const sharedId = params.get("trip");
    if(sharedId){
      if(!tripIndex.find(t=>t.id===sharedId)){
        const loaded = await loadTrip(sharedId);
        tripIndex.push(indexEntryFrom(sharedId, loaded));
        saveTripIndexLocal();
      }
      document.getElementById("loadingScreen").style.display = "none";
      await openTrip(sharedId);
      return;
    }

    renderFolderGrid();
    showTripView(false);
    showFolderView(true);
    document.getElementById("loadingScreen").style.display = "none";
  }

  init();
})();
</script>
</body>
